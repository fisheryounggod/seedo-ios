name: SeedoIOS
options:
  bundleIdPrefix: tech.seedo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
targets:
  SeedoIOS:
    type: application
    platform: iOS
    sources:
      - path: SeedoIOS
    resources:
      - path: SeedoIOS/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.seedo.ios
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "" 
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: "tech.seedo.ios.focus25"
            UIApplicationShortcutItemTitle: "开始 25 分钟专注"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypePlay"
          - UIApplicationShortcutItemType: "tech.seedo.ios.insights"
            UIApplicationShortcutItemTitle: "查看专注统计"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypeDate"
          - UIApplicationShortcutItemType: "tech.seedo.ios.settings"
            UIApplicationShortcutItemTitle: "设置"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypeSettings"
          - UIApplicationShortcutItemType: "tech.seedo.ios.add_record"
            UIApplicationShortcutItemTitle: "手动添加记录"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypeAdd"
        UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Seedo 需要访问日历以将你的专注记录同步为日历事件。"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Seedo 需要访问日历以将你的专注记录同步为日历事件，帮助你直观回顾一天的成果。"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Charts.framework
      - sdk: EventKit.framework
      - target: SeedoWidget
  SeedoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SeedoWidget
      - path: SeedoIOS/Services/FocusActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.seedo.ios.widget
        INFOPLIST_FILE: SeedoWidget/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
